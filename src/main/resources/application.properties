# Configuración de la base de datos MySQL (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/media_cms?serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Deshabilitar banner de Spring para una consola más limpia
spring.main.banner-mode=off
